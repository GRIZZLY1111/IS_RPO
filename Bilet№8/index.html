<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Конвертер размеров</title>
</head>
<body>
    <main>
        <div class="container">
            <H1>Конвертер длины</H1>
        <input type="number" name="number" id="number" placeholder="Введите значение">
        <div class="vibor">
        <label for="">Из</label>
        <select name="" id="from_value">
            <option value="m" selected>Метра</option>
            <option value="in">Дюйма</option>
            <option value="ft">Фута</option>
            <option value="yd">Ярда</option>
            <option value="mi">Мили</option>
        </select>
        <label for="">В</label>
        <select name="" id="to_value">
            <option value="m" selected>Метр</option>
            <option value="in">Дюйм</option>
            <option value="ft">Фут</option>
            <option value="yd">Ярд</option>
            <option value="mi">Милю</option>
        </select>
        </div>
            <button class="btn">Расчет</button>
            <p class="result"></p>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
