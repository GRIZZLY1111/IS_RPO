<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="box">
                <p class="text"></p>
            </div>
            <div class="item">
                <label for="">Длина</label>
                <p class="number"></p>
                <input type="range" name="" id="dlina" max="16" min="4" step="1">
            </div>
            <div class="item">
                <label for="">Верхний регистр</label>
                <input type="checkbox" name="up" id="up">
            </div>
            <div class="item">
                <label for="">Нижний регистр</label>
                <input type="checkbox" name="down" id="down">
            </div>
            <div class="item">
                <label for="">Специальные символы</label>
                <input type="checkbox" name="special" id="special">
            </div>
            <div class="item">
                <label for="">Цифры</label>
                <input type="checkbox" name="digital" id="digital">
            </div>
            <button class="btn">
                Создать пароль
            </button>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
